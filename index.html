<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Toko Flash</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wide">Flash Store</h1>
            <a href="https://api.whatsapp.com/send?phone=6287860288354" target="_blank" class="text-sm bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-full font-medium transition duration-200 shadow-sm border border-blue-500">
                Fast Response via WA
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <h2 class="text-xl font-semibold mb-6 text-gray-800">Produk Utama</h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col justify-between">
                <img src="https://res.cloudinary.com/flashphone/image/upload/v1781023107/Untitled_fkqulf.png" alt="Produk 1" class="w-full h-48 object-cover">
                <div class="p-4 flex-grow">
                    <h3 class="font-bold text-gray-900 text-lg mb-1">EDC Saku M3BT</h3>
                    <p class="text-gray-600 text-sm mb-4">Keunggulan Mesin EDC M3BT Tanpa target bulanan, garansi 1 tahun, support kartu bansos.</p>
                </div>
                <div class="p-4 pt-0">
                    <div class="text-blue-600 font-bold text-xl mb-3">Rp 580.000</div>
                    <button onclick="bukaFormPemesanan('EDC Saku M3BT', 'Rp 580.000')" class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-2 px-4 rounded-md transition duration-200 text-center block cursor-pointer">
                        Beli Sekarang
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col justify-between">
                <img src="https://res.cloudinary.com/flashphone/image/upload/c_scale,h_333,w_500/v1781023293/edddc_wusrn3.png" alt="Produk 2" class="w-full h-48 object-cover">
                <div class="p-4 flex-grow">
                    <h3 class="font-bold text-gray-900 text-lg mb-1">EDC T1</h3>
                    <p class="text-gray-600 text-sm mb-4">Fitur lengkap dengan printer bawaan & aplikasi Flash Xtra. Registrasi cepat.</p>
                </div>
                <div class="p-4 pt-0">
                    <div class="text-blue-600 font-bold text-xl mb-3">Rp 2.500.000</div>
                    <button onclick="bukaFormPemesanan('EDC T1', 'Rp 2.500.000')" class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-2 px-4 rounded-md transition duration-200 text-center block cursor-pointer">
                        Beli Sekarang
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="modalOrder" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50" onclick="tutupFormPemesanan()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded shadow-lg z-50 overflow-y-auto">
            <div id="modalContent" class="modal-content py-4 text-left px-6">
                <div class="flex justify-between items-center pb-3 border-b mb-4">
                    <p class="text-2xl font-bold text-gray-800">Form Pembelian</p>
                    <div class="modal-close cursor-pointer" onclick="tutupFormPemesanan()">
                        <svg class="fill-current text-black" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
                            <path d="M14.53 4.53l-1.06-1.06L9 7.94 4.53 3.47 3.47 4.53 7.94 9l-4.47 4.47 1.06 1.06L9 10.06l4.47 4.47 1.06-1.06L10.06 9z"></path>
                        </svg>
                    </div>
                </div>

                <div id="areaForm">
                    <form onsubmit="kirimKeDashboardDanCopy(event)">
                        <div class="mb-4 bg-gray-50 p-3 rounded-md">
                            <p class="text-sm text-gray-500">Produk:</p>
                            <p id="namaProdukModal" class="font-bold text-gray-800"></p>
                            <p id="hargaProdukModal" class="text-blue-600 font-semibold"></p>
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2">Nama Lengkap</label>
                            <input type="text" id="namaPembeli" required class="shadow border rounded w-full py-2 px-3 text-gray-700 focus:outline-none" placeholder="Contoh: Budi Santoso">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2">Alamat Lengkap</label>
                            <textarea id="alamatPembeli" required class="shadow border rounded w-full py-2 px-3 text-gray-700 focus:outline-none" rows="3" placeholder="Jl. Anggrek No. 12"></textarea>
                        </div>
                        <div class="mb-6">
                            <label class="block text-gray-700 text-sm font-bold mb-2">Metode Pembayaran</label>
                            <select id="metodeBayar" class="shadow border rounded w-full py-2 px-3 text-gray-700 focus:outline-none">
                                <option value="Transfer Bank">Transfer Bank</option>
                            </select>
                        </div>
                        <div class="flex justify-end pt-2">
                            <button type="button" onclick="tutupFormPemesanan()" class="px-4 bg-gray-200 p-3 rounded-lg mr-2 hover:bg-gray-300">Batal</button>
                            <button type="submit" class="px-4 bg-blue-600 p-3 rounded-lg text-white hover:bg-blue-700 font-medium">Konfirmasi</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const NOMOR_CS = "0878-6028-8354";
        let produkTerpilih = "", hargaTerpilih = "";

        function bukaFormPemesanan(nama, harga) {
            produkTerpilih = nama; hargaTerpilih = harga;
            document.getElementById('namaProdukModal').innerText = nama;
            document.getElementById('hargaProdukModal').innerText = harga;
            const modal = document.getElementById('modalOrder');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function tutupFormPemesanan() {
            const modal = document.getElementById('modalOrder');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
        }

        function kirimKeDashboardDanCopy(event) {
            event.preventDefault();
            const nama = document.getElementById('namaPembeli').value;
            const alamat = document.getElementById('alamatPembeli').value;
            const metode = document.getElementById('metodeBayar').value;

            // ==========================================
            // SILAKAN GANTI BAGIAN INI DENGAN DATA ANDA
            // ==========================================
            const urlForm = "https://docs.google.com/forms/d/e/1FAIpQLScRuBDUrC-_rk3Jdp8BQCDIodhEko8W9G-zYk-G1GWxN_QNDA/formResponse";
            const formData = new FormData();
            formData.append('entry.1034345429', produkTerpilih); // Ganti XXXXX dengan ID Produk Anda
            formData.append('entry.1362190117', nama);           // Ganti XXXXX dengan ID Nama Anda
            formData.append('entry.798374921', alamat);         // Ganti XXXXX dengan ID Alamat Anda
            formData.append('entry.1479871032', metode);         // Ganti XXXXX dengan ID Metode Anda
            // ==========================================

            // Kirim data secara background tanpa pindah halaman
            fetch(urlForm, { method: 'POST', body: formData, mode: 'no-cors' });

            // Salin format teks sebagai cadangan manual ke WA jika pembeli butuh
            const teksPesan = `FORMAT ORDERAN BARU\nProduk: ${produkTerpilih}\nHarga: ${hargaTerpilih}\nNama: ${nama}\nAlamat: ${alamat}\nPembayaran: ${metode}`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(teksPesan);
            }

            // Tampilkan pesan sukses di modal
            document.getElementById('areaForm').innerHTML = `
                <div class="text-center py-4">
                    <div class="bg-green-100 text-green-800 p-3 rounded-md mb-4 text-xs font-medium">
                        Pesanan Berhasil Dikirim ke Sistem Dashboard Admin!
                    </div>
                    <p class="text-xs text-gray-600 mb-4">Format teks cadangan juga telah disalin otomatis ke memori HP.</p>
                    <button onclick="tutupFormPemesanan()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg">Selesai</button>
                </div>
            `;
        }
    </script>
</body>
</html>
