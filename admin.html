<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Flash Store</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased">

    <header class="bg-gray-800 shadow-md border-b border-gray-700 py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-blue-400">⚡ ADMIN DASHBOARD</h1>
            <span class="text-xs bg-green-500 text-gray-900 px-3 py-1 rounded-full font-bold animate-pulse">LIVE MONITOR</span>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-semibold text-gray-400">Daftar Orderan Masuk</h2>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white text-xs px-3 py-1.5 rounded font-medium transition">
                Refresh Data
            </button>
        </div>
        
        <div class="bg-gray-800 p-2 rounded-lg shadow-xl border border-gray-700 overflow-hidden">
            <iframe src="https://docs.google.com/spreadsheets/d/1KwqkM4xU8t-uM5VFy6Eo2LLKwPvEBiCkTEh4N3fOYSY/edit?usp=sharing" class="w-full h-[600px] rounded border-0 bg-white"></iframe>
        </div>
    </main>

</body>
</html>
